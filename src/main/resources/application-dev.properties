# ---- Base de données MySQL (Développement) ----
spring.datasource.url=jdbc:mysql://localhost:3306/taskmanagerdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ---- JWT Configuration ----
jwt.secret=TaskManagerSecretKeyForDevelopment2026VeryLongKeyForHMACSHA256Algorithm
jwt.expiration=86400000

# ---- Logging ----
logging.level.root=INFO
logging.level.com.taskmanager=DEBUG
logging.level.org.springframework.security=DEBUG
