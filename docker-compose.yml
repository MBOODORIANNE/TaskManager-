version: '3.8'

services:
  # ── Base de données MySQL ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: taskmanager-db
    environment:
      MYSQL_DATABASE: taskmanagerdb
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: taskpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
    networks:
      - taskmanager-network

  # ── Application Spring Boot ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanager-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/taskmanagerdb?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: taskuser
      SPRING_DATASOURCE_PASSWORD: taskpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: taskmanager-super-secret-jwt-key-2026-must-be-very-long-and-secure
      JWT_EXPIRATION: 86400000
    volumes:
      - ./logs:/app/logs
    networks:
      - taskmanager-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  mysql_data:


networks:
  taskmanager-network:
    driver: bridge
